<!DOCTYPE html>
<html>
<head>
<title>Admin Control</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

<div class="bg-white p-8 rounded-xl shadow w-[350px]">

<h2 class="text-xl font-bold mb-4">🚦 Admin Control Panel</h2>

<select id="congestion" class="w-full p-2 border rounded mb-3">
<option value="LOW">LOW</option>
<option value="MEDIUM">MEDIUM</option>
<option value="HIGH">HIGH</option>
</select>

<label class="flex items-center gap-2 mb-3">
<input type="checkbox" id="accident">
Accident
</label>

<input type="number" id="vehicles" placeholder="Vehicle Count"
class="w-full p-2 border rounded mb-3">

<button onclick="sendUpdate()"
class="w-full bg-indigo-600 text-white p-2 rounded">
Update Traffic
</button>

</div>

<script>
function sendUpdate(){
fetch("/admin/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
congestion:document.getElementById("congestion").value,
accident:document.getElementById("accident").checked,
vehicle_count:document.getElementById("vehicles").value
})
});
}
</script>

</body>
</html>
