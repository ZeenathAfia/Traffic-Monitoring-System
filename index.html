<!DOCTYPE html>
<html lang="en" class="transition duration-500">
<head>
<meta charset="UTF-8">
<title>Route Selection</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
*{
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* Floating blobs */
.blob{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:0.35;
animation:float 12s infinite ease-in-out;
}
@keyframes float{
0%,100%{ transform:translateY(0);}
50%{ transform:translateY(-40px);}
}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-50 via-cyan-50 to-slate-50 
dark:from-gray-900 dark:via-gray-800 dark:to-black 
flex items-center justify-center min-h-screen transition duration-500">

<!-- THEME BUTTON -->
<button onclick="toggleTheme()" 
class="absolute top-5 right-5 px-3 py-1 rounded-full bg-white/70 dark:bg-gray-700 text-xs shadow hover:scale-105 transition">
🌙
</button>

<!-- BLOBS -->
<div class="blob w-[280px] h-[280px] bg-indigo-400 top-[-80px] left-[-80px]"></div>
<div class="blob w-[220px] h-[220px] bg-cyan-300 bottom-[-80px] right-[-80px]"></div>

<div class="card backdrop-blur-xl bg-white/70 dark:bg-gray-800/60 shadow-2xl rounded-2xl p-8 w-[360px] text-center">

<h2 class="text-2xl font-semibold text-gray-800 dark:text-white mb-6">
🗺 Choose Route
</h2>

<div class="input-box mb-4">
<input id="source" type="text" placeholder="📍 Current Location"
class="w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-black dark:text-white focus:ring-2 focus:ring-cyan-400 outline-none transition">
</div>

<div class="input-box mb-4">
<input id="dest" type="text" placeholder="🎯 Destination"
class="w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-black dark:text-white focus:ring-2 focus:ring-cyan-400 outline-none transition">
</div>

<button onclick="goNext()"
class="w-full py-2 rounded-lg bg-gradient-to-r from-indigo-600 to-cyan-500 text-white font-semibold hover:scale-105 hover:shadow-lg transition">
Search Route
</button>

</div>

<script>

function toggleTheme(){
document.documentElement.classList.toggle("dark");
}

function goNext(){

const source=document.getElementById("source").value
const dest=document.getElementById("dest").value

if(!source || !dest){
alert("Please enter both locations")
return
}

localStorage.setItem("source",source)
localStorage.setItem("dest",dest)

window.location.href="/dashboard"

}

</script>

</body>
</html>
