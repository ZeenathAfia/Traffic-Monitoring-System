<!DOCTYPE html>
<html lang="en" class="transition duration-500">

<head>
<meta charset="UTF-8">
<title>Smart Traffic Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- TAILWIND -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
darkMode: 'class'
}
</script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
overflow-x:hidden;
}

/* BLOBS */

.blob{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:0.35;
animation:float 12s infinite ease-in-out;
z-index:-1;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-40px);}
}

#map{
height:500px;
border-radius:18px;
}

/* ROUTING PANEL */

.leaflet-routing-container{
background:rgba(0,0,0,0.8)!important;
color:white!important;
border-radius:12px;
padding:10px;
font-size:14px;
max-height:350px;
overflow:auto;
}

.leaflet-routing-container *{
color:white!important;
}

.leaflet-routing-alt{
opacity:0.9;
}

.leaflet-routing-container .leaflet-routing-alt:nth-child(2){
border-left:4px solid orange;
}

.leaflet-routing-icon{
filter:invert(1);
}

video{
border-radius:12px;
margin-top:10px;
object-fit:cover;
}

</style>
</head>

<body class="bg-gradient-to-br from-indigo-50 via-cyan-50 to-slate-50 
dark:from-gray-900 dark:via-gray-800 dark:to-black 
text-gray-800 dark:text-white min-h-screen transition duration-500">

<!-- BLOBS -->

<div class="blob w-[300px] h-[300px] bg-indigo-400 top-[-100px] left-[-100px]"></div>
<div class="blob w-[250px] h-[250px] bg-cyan-300 bottom-[-100px] right-[-100px]"></div>

<!-- NAVBAR -->

<div class="flex justify-between items-center px-8 py-4 
backdrop-blur-xl bg-white/60 dark:bg-gray-800/60 
border-b border-white/20 shadow-sm">

<div class="text-lg font-semibold">
🚦 Smart Traffic System
</div>

<div class="flex gap-3">

<button onclick="location.href='/traffic-analytics'"
class="px-4 py-2 rounded-lg bg-gradient-to-r from-indigo-600 to-cyan-500 text-white shadow hover:scale-105 transition">
Analytics
</button>

<button onclick="location.href='/logout'"
class="px-4 py-2 rounded-lg bg-gradient-to-r from-pink-500 to-red-500 text-white shadow hover:scale-105 transition">
Logout
</button>

<button onclick="toggleTheme()"
class="px-3 py-2 rounded-full bg-white/70 dark:bg-gray-700 shadow">
🌙
</button>

</div>
</div>

<!-- MAIN -->

<div class="flex gap-5 p-5">

<!-- MAP -->

<div class="w-[70%] backdrop-blur-xl bg-white/70 dark:bg-gray-800/60 
p-4 rounded-2xl shadow-xl">

<h3 class="text-lg font-semibold mb-3">
🗺️ Live Navigation
</h3>

<div id="map"></div>

</div>

<!-- RIGHT PANEL -->

<div class="w-[30%] backdrop-blur-xl bg-white/70 dark:bg-gray-800/60 
p-5 rounded-2xl shadow-xl">

<h3 class="text-lg font-semibold mb-2">
📊 Live Analysis
</h3>

<div id="analysis">
Analyzing...
</div>

<h3 class="text-lg font-semibold mt-5 mb-2">
🎥 Live Traffic Feed
</h3>

<video id="trafficVideo" width="100%" height="220"
autoplay muted loop playsinline>

<source src="/static/accident.mp4" type="video/mp4">

</video>

</div>

</div>

<!-- LEAFLET -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>

// ==========================
// GLOBAL VARIABLES
// ==========================

let routingControl = null;
let sourceMarker = null;
let destMarker = null;
let alertMarker = null;
let currentDest = null;
let currentSource = null;

// ==========================
// THEME
// ==========================

function toggleTheme(){
document.documentElement.classList.toggle("dark");
}

// ==========================
// MAP
// ==========================

const map = L.map('map').setView([11.1271,78.6569],7);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

// ==========================
// GET COORDINATES
// ==========================

async function getCoords(place){

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(place)}`
);

const data = await response.json();

if(data.length === 0){

alert("Location not found : " + place);

return null;

}

return L.latLng(
parseFloat(data[0].lat),
parseFloat(data[0].lon)
);

}catch(error){

console.error(error);

alert("Map loading error");

return null;

}

}

// ==========================
// INITIALIZE ROUTE
// ==========================

async function initRoute(){

const sourceName =
localStorage.getItem("source") || "Dindigul";

const destName =
localStorage.getItem("dest") || "Chennai";

console.log("SOURCE:",sourceName);
console.log("DEST:",destName);

currentSource = await getCoords(sourceName);

currentDest = await getCoords(destName);

if(!currentSource || !currentDest) return;

// REMOVE OLD MARKERS

if(sourceMarker){
map.removeLayer(sourceMarker);
}

if(destMarker){
map.removeLayer(destMarker);
}

if(routingControl){
map.removeControl(routingControl);
}

// ICONS

const sourceIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/684/684908.png",
iconSize:[35,35]
});

const destIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/2776/2776067.png",
iconSize:[35,35]
});

// SOURCE MARKER

sourceMarker = L.marker(currentSource,{
icon:sourceIcon
})
.addTo(map)
.bindPopup(`📍 Source : ${sourceName}`)
.openPopup();

// DESTINATION MARKER

destMarker = L.marker(currentDest,{
icon:destIcon
})
.addTo(map)
.bindPopup(`🎯 Destination : ${destName}`);

// ROUTING CONTROL

routingControl = L.Routing.control({

waypoints:[
currentSource,
currentDest
],

router: L.Routing.osrmv1({
serviceUrl:
'https://router.project-osrm.org/route/v1'
}),

showAlternatives:true,

altLineOptions:{
styles:[
{
color:'orange',
weight:5,
dashArray:'10,10'
}
]
},

lineOptions:{
styles:[
{
color:'blue',
weight:6
}
]
},

fitSelectedRoutes:true,
routeWhileDragging:false,
show:true,
addWaypoints:false,
collapsible:true,

createMarker:()=>null

}).addTo(map);

// FIT BOUNDS

map.fitBounds([
currentSource,
currentDest
]);

}

// ==========================
// UPDATE ROUTE
// ==========================

async function updateRoute(useAlternate){

if(!routingControl) return;

const sourceName =
localStorage.getItem("source") || "";

const destName =
localStorage.getItem("dest") || "";

// SPECIAL CASE

if(
sourceName.toLowerCase().includes("dindigul")
&&
destName.toLowerCase().includes("kodaikanal")
){

const batlagundu =
await getCoords("Batlagundu");

const oddanchatram =
await getCoords("Oddanchatram");

// MAIN ROUTE

routingControl.setWaypoints([
currentSource,
batlagundu,
currentDest
]);

if(useAlternate){

setTimeout(()=>{

// ALTERNATE ROUTE

routingControl.setWaypoints([
currentSource,
oddanchatram,
currentDest
]);

showPopup(
"🚀 Alternate Route Activated via Oddanchatram"
);

},3000);

}

return;

}

// NORMAL ROUTES

routingControl.setWaypoints([
currentSource,
currentDest
]);

}
function showPopup(message){

L.popup()
.setLatLng(currentSource)
.setContent(message)
.openOn(map);

setTimeout(()=>{
map.closePopup();
},4000);

}

// ==========================
// TRAFFIC ALERT
// ==========================

async function showTrafficAlert(){

if(alertMarker){
map.removeLayer(alertMarker);
}

const icon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/854/854878.png",
iconSize:[40,40]
});

alertMarker = L.marker(currentSource,{
icon
})
.addTo(map)
.bindPopup("🚦 Heavy Traffic Ahead")
.openPopup();

setTimeout(()=>{
map.closePopup();
},4000);

}

// ==========================
// ACCIDENT ALERT
// ==========================

async function showAccidentAlert(){

if(alertMarker){
map.removeLayer(alertMarker);
}

const icon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/565/565547.png",
iconSize:[40,40]
});

alertMarker = L.marker(currentSource,{
icon
})
.addTo(map)
.bindPopup("🚨 Accident Detected")
.openPopup();

setTimeout(()=>{
map.closePopup();
},4000);

}

// ==========================
// ANALYSIS
// ==========================

function runAnalysis(){

fetch("/analyze",{
method:"POST"
})
.then(res=>res.json())
.then(data=>{

let useAlternate = false;

let suggestion =
"✅ Normal Traffic Flow";

if(data.congestion === "MEDIUM"){

useAlternate = true;

suggestion =
"⚠️ Moderate Traffic - Alternate Route Suggested";

}

if(data.congestion === "HIGH"){

useAlternate = true;

suggestion =
"🚦 Heavy Traffic - Alternate Route Recommended";

showTrafficAlert();

}

if(data.accident === true){

useAlternate = true;

suggestion =
"🚨 Accident Detected - Alternate Route Required";

showAccidentAlert();

}

// CARD COLOR

let cls = "bg-green-500";

if(data.congestion === "MEDIUM"){
cls = "bg-yellow-400 text-black";
}

if(data.congestion === "HIGH"){
cls = "bg-red-500";
}

// UI

document.getElementById("analysis").innerHTML = `

<div class="p-3 rounded-lg text-sm font-semibold ${cls}">
Traffic : ${data.congestion}<br>
Vehicles : ${data.vehicle_count}
</div>

<div class="p-3 rounded-lg bg-red-500 text-white mt-3">
${suggestion}
</div>

`;

// UPDATE ROUTE

updateRoute(useAlternate);

})
.catch(error=>{

console.error(error);

document.getElementById("analysis").innerHTML = `
<div class="p-3 rounded-lg bg-red-500 text-white">
Analysis failed
</div>
`;

});

}

// ==========================
// VIDEO RELOAD
// ==========================

function reloadVideo(){

const video =
document.getElementById("trafficVideo");

video.pause();
video.load();
video.play();

}

// ==========================
// START
// ==========================

initRoute();

runAnalysis();

setInterval(()=>{

runAnalysis();
reloadVideo();

},120000);

</script>

</body>
</html>
