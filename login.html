<!DOCTYPE html>
<html lang="en" class="transition duration-500">
<head>
<meta charset="UTF-8">
<title>Smart Traffic Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<style>
/* Floating blobs */
.blob{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:0.35;
animation:float 12s infinite ease-in-out;
}
@keyframes float{
0%,100%{ transform:translateY(0);}
50%{ transform:translateY(-40px);}
}

/* Signal animation */
.light{
width:12px;
height:12px;
border-radius:50%;
opacity:0.3;
}
.red{ background:#ef4444; animation:signal 6s infinite; }
.yellow{ background:#facc15; animation:signal 6s infinite 2s; }
.green{ background:#22c55e; animation:signal 6s infinite 4s; }

@keyframes signal{
0%{opacity:0.3;}
20%{opacity:1; box-shadow:0 0 12px currentColor;}
40%{opacity:0.3;}
100%{opacity:0.3;}
}
</style>

</head>

<body class="bg-gradient-to-br from-indigo-50 via-cyan-50 to-slate-50 
dark:from-gray-900 dark:via-gray-800 dark:to-black 
flex items-center justify-center min-h-screen transition duration-500 font-[Inter]">

<!-- THEME BUTTON -->
<button onclick="toggleTheme()" 
class="absolute top-5 right-5 px-3 py-1 rounded-full bg-white/70 dark:bg-gray-700 text-xs shadow hover:scale-105 transition">
🌙
</button>

<!-- BLOBS -->
<div class="blob w-[280px] h-[280px] bg-indigo-400 top-[-80px] left-[-80px]"></div>
<div class="blob w-[220px] h-[220px] bg-cyan-300 bottom-[-80px] right-[-80px]"></div>

<!-- CARD (same structure, new theme) -->
<div class="card backdrop-blur-xl bg-white/70 dark:bg-gray-800/60 shadow-2xl rounded-2xl p-8 w-[360px] text-white">

<!-- SIGNAL -->
<div class="flex justify-center gap-2 mb-4">
<div class="light red"></div>
<div class="light yellow"></div>
<div class="light green"></div>
</div>

<h2 class="text-2xl font-semibold text-center text-gray-800 dark:text-white mb-6">
🚦 Smart Traffic System
</h2>

<!-- SUCCESS ALERT -->
{% if request.args.get('signup') == 'success' %}
<div class="mb-4 text-center bg-green-500/90 text-white py-2 rounded-lg text-sm font-semibold shadow">
    ✅ Account created successfully! You can now login.
</div>
{% endif %}

<form action="/login" method="POST" class="space-y-4">

<div class="input-box">
<input type="text" name="username" placeholder="Username" required
class="w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-black dark:text-white focus:ring-2 focus:ring-cyan-400 outline-none transition">
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" required
class="w-full px-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-black dark:text-white focus:ring-2 focus:ring-cyan-400 outline-none transition">
</div>

<button type="submit"
class="w-full py-2 rounded-lg bg-gradient-to-r from-indigo-600 to-cyan-500 text-white font-semibold hover:scale-105 hover:shadow-lg transition">
Login
</button>

</form>

<p class="mt-4 text-center text-sm text-gray-600 dark:text-gray-300">
New user? 
<a href="/signup-page" class="text-indigo-600 dark:text-cyan-400 hover:underline">
Create an account
</a>
</p>

</div>

<script>
function toggleTheme(){
document.documentElement.classList.toggle("dark");
}
</script>

</body>
</html>
